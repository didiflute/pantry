<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FEFCF8;
  --card:#FFFFFF;
  --text:#2C1810;
  --muted:#A09080;
  --border:#EDE4D8;
  --instant:#E85030;
  --instant-bg:#FFF3EE;
  --quick:#C07820;
  --quick-bg:#FFF8EE;
  --snack:#5A8C3C;
  --snack-bg:#F2F8EC;
  --fridge:#3070B8;
  --fridge-bg:#EEF4FF;
  --condiment:#8C6820;
  --condiment-bg:#FBF6EC;
  --radius:14px;
  --shadow:0 2px 12px rgba(44,24,16,0.08);
}
html,body{height:100%;background:#F5EFE8}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* ── HEADER ILLUSTRATION ── */
.header-illo{
  position:relative;
  height:130px;
  overflow:hidden;
  background:#FFF8F0;
}
.header-illo svg{width:100%;height:100%}
.header-overlay{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:10px 16px 8px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
}
.app-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:24px;
  color:#2C1810;
  text-shadow:0 1px 0 rgba(255,255,255,0.8);
  line-height:1;
}
.app-title span{color:var(--instant)}
.expire-chip{
  background:rgba(255,255,255,0.92);
  border:1px solid #FFD0B8;
  border-radius:20px;
  padding:4px 10px;
  font-size:11px;
  color:var(--instant);
  font-weight:500;
  backdrop-filter:blur(4px);
  display:none;
}
.expire-chip.visible{display:block}

/* ── STICKY NAV ── */
.sticky-nav{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.tabs{
  display:flex;
  padding:10px 12px 0;
  gap:4px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  padding:6px 14px;
  border-radius:20px 20px 0 0;
  border:1.5px solid transparent;
  background:transparent;
  font-size:12px;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.2s;
  font-weight:500;
  white-space:nowrap;
  border-bottom:none;
}
.tab.active{
  background:var(--card);
  color:var(--text);
  border-color:var(--border);
  border-bottom-color:var(--card);
  font-weight:600;
}
.tab-line{height:1px;background:var(--border);margin:0 12px}

/* ── CONTENT ── */
.content{padding:12px 14px 100px}


/* Expiry quick buttons */
.expiry-quick{
  padding:7px 13px;border-radius:20px;
  border:1.5px solid var(--border);
  background:white;font-size:12px;font-weight:600;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--muted);cursor:pointer;
  transition:all 0.15s;
}
.expiry-quick:active,.expiry-quick.selected{
  background:#F5EFE8;border-color:#D4A870;color:var(--text);
}
/* ── EXPIRE BANNER ── */
.expire-banner{
  background:#2C1810;
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:14px;
  display:none;
  animation:fadeUp 0.3s ease both;
}
.expire-banner.visible{display:block}
.expire-banner-title{
  font-size:13px;font-weight:700;color:#FFE8DC;
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
  letter-spacing:0.3px;
}
.expire-items-row{display:flex;flex-wrap:wrap;gap:6px}
.expire-item-tag{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:5px 12px;
  font-size:12px;color:white;font-weight:500;
  display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:background 0.15s;
}
.expire-item-tag:active{background:rgba(255,255,255,0.22);}
.expire-item-tag.danger{color:#FFB0A0;}
.expire-item-tag.warn{color:#FFD090;}

/* ── ITEM CARD ── */
.item-card{
  background:var(--card);
  border-radius:var(--radius);
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.15s;
  animation:fadeUp 0.25s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.item-card:active{transform:scale(0.98)}
.item-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3.5px;border-radius:2px 0 0 2px;
}
.item-card.status-danger{border-color:#FFD8CC}
.item-card.status-danger::before{background:var(--instant)}
.item-card.status-warn::before{background:var(--quick)}

.item-card.status-expired::before{background:#CCC}

}
.item-info{flex:1;min-width:0}
.item-name{

}
.item-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-qty{

}
.item-note{
  font-size:11px;color:#C8A070;

  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:120px;
}
.expire-badge{

  font-size:11px;font-weight:600;

  text-align:center;
}
.badge-danger{background:#FFE8DC;color:#C03010}
.badge-warn{background:#FFF4DC;color:#A06010}
.badge-ok{background:#EDF5E0;color:#3A7020}
.badge-expired{background:#F0F0F0;color:#999}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:40px 20px;
  display:none;
}
.empty.visible{display:block}
.empty-illo{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--muted);line-height:1.7}

/* ── FAB ── */
.fab{
  position:fixed;bottom:24px;
  left:50%;transform:translateX(-50%);
  width:calc(min(430px,100vw) - 28px);
  max-width:402px;
  background:var(--text);
  color:white;border:none;
  border-radius:50px;
  padding:15px 24px;
  font-size:14px;font-weight:600;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 28px rgba(44,24,16,0.28);
  transition:transform 0.15s,box-shadow 0.15s;
  z-index:200;
}
.fab:active{transform:translateX(-50%) scale(0.97)}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(44,24,16,0.45);
  z-index:300;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg);
  border-radius:24px 24px 0 0;
  width:100%;max-width:430px;
  margin:0 auto;
  padding:20px 20px 40px;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh;
  overflow-y:auto;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{
  width:36px;height:4px;
  background:#D8CCC0;border-radius:2px;
  margin:0 auto 18px;
}
.modal-title{
  font-family:'Noto Serif SC',serif;
  font-size:18px;font-weight:700;
  margin-bottom:18px;color:var(--text);
}

/* Form */
.form-group{margin-bottom:14px}
.form-label{
  font-size:12px;font-weight:600;color:var(--muted);
  margin-bottom:6px;display:block;letter-spacing:0.5px;
}
.form-input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);
  border-radius:10px;
  font-size:14px;font-family:'Noto Sans SC',sans-serif;
  background:white;color:var(--text);
  outline:none;transition:border-color 0.15s;
}
.form-input:focus{border-color:#D4A870}
.form-textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);
  border-radius:10px;
  font-size:13px;font-family:'Noto Sans SC',sans-serif;
  background:white;color:var(--text);
  outline:none;resize:none;height:72px;
  transition:border-color 0.15s;
  line-height:1.6;
}
.form-textarea:focus{border-color:#D4A870}

/* Category pills */
.cat-pills{display:flex;flex-wrap:wrap;gap:8px}
.cat-pill{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--border);
  background:white;font-size:12px;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--muted);cursor:pointer;
  transition:all 0.15s;font-weight:500;
}
.cat-pill.selected{border-color:currentColor}
.cat-pill[data-cat="instant"].selected{background:#FFF3EE;color:var(--instant)}
.cat-pill[data-cat="quick"].selected{background:#FFF8EE;color:var(--quick)}
.cat-pill[data-cat="snack"].selected{background:#F2F8EC;color:var(--snack)}
.cat-pill[data-cat="fridge"].selected{background:#EEF4FF;color:var(--fridge)}
.cat-pill[data-cat="condiment"].selected{background:#FBF6EC;color:var(--condiment)}

/* Qty selector */
.qty-pills{display:flex;gap:8px}
.qty-pill{
  flex:1;padding:9px 0;
  border:1.5px solid var(--border);
  border-radius:10px;background:white;
  font-size:13px;font-family:'Noto Sans SC',sans-serif;
  color:var(--muted);cursor:pointer;

}
.qty-pill.selected{background:#F5EFE8;border-color:#D4A870;color:var(--text);font-weight:600}

/* Emoji picker */
.emoji-grid{

  gap:6px;margin-top:4px;
}
.emoji-opt{
  aspect-ratio:1;display:flex;align-items:center;

}
.emoji-opt:active{transform:scale(0.9)}
.emoji-opt.selected{border-color:#D4A870;background:#FFF3E8}

/* Submit btn */
.submit-btn{
  width:100%;padding:14px;
  background:var(--text);color:white;
  border:none;border-radius:50px;
  font-size:14px;font-weight:600;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;margin-top:6px;
  transition:opacity 0.15s;
}
.submit-btn:active{opacity:0.85}

/* Detail modal */
.detail-emoji{font-size:64px;text-align:center;margin:10px 0 14px}
.detail-name{

}
.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;

}
.detail-cell{
  background:white;border-radius:10px;
  padding:10px 12px;

}
.detail-cell-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:0.4px}
.detail-cell-val{font-size:14px;font-weight:600;color:var(--text)}
.detail-note{
  background:white;border-radius:10px;
  padding:12px 14px;border:1px solid var(--border);
  margin-bottom:14px;
}
.detail-note-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:0.4px}
.detail-note-text{font-size:13px;color:#806050;font-style:italic;line-height:1.6}
.detail-photo{

.detail-actions{display:flex;gap:8px}
.btn-eaten{

/* Photo upload area */
.photo-upload{
  border:2px dashed var(--border);

.photo-upload:hover{border-color:#D4A870}

.photo-preview{

/* Settings / backup */
.settings-btn{

}

/* Section label */
.section-label{
  font-size:11px;font-weight:700;
  color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;
  padding:4px 2px 8px;
}


</style>
</head>

function autoEmoji(name){
  if(!name) return '🥫';
  for(const [keywords, emoji] of EMOJI_MAP){
    if(keywords.some(k => name.includes(k))) return emoji;
  }
  return '🥫';
}

// Shopping list
let shopItems = [];
const SHOP_KEY = 'pantry_shop_v1';
function loadShop(){ try{ shopItems=JSON.parse(localStorage.getItem(SHOP_KEY))||[]; }catch(e){ shopItems=[]; } }
function saveShop(){ localStorage.setItem(SHOP_KEY, JSON.stringify(shopItems)); }

function updateShopPanel(){
  const panel = document.getElementById('shopPanel');
  const count = document.getElementById('shopCount');
  if(panel){ panel.style.display = shopItems.length ? 'block' : 'none'; }
  if(count){ count.textContent = shopItems.length; }
}

function openShopModal(){
  const list = document.getElementById('shopList');
  const empty = document.getElementById('shopEmpty');
  if(!shopItems.length){
    list.innerHTML='';
    empty.style.display='block';
  } else {
    empty.style.display='none';
    list.innerHTML = shopItems.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border)">
        <div style="font-size:24px">${s.emoji}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600;color:var(--text)">${s.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">已吃完 · 需要补货</div>
        </div>
        <button onclick="removeShopItem(${i})" style="background:#F5EFE8;border:none;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);cursor:pointer">✓ 已买</button>
      </div>`).join('');
  }
  document.getElementById('shopModal').classList.add('open');
}

function removeShopItem(idx){
  shopItems.splice(idx,1);
  saveShop(); updateShopPanel(); openShopModal();
}

function clearShopList(){
  shopItems=[];
  saveShop(); updateShopPanel(); closeModal('shopModal');
}

function addToShopList(item){
  if(!shopItems.find(s=>s.name===item.name)){
    shopItems.push({name:item.name, emoji:item.emoji});
    saveShop(); updateShopPanel();
  }
}

function load(){
  try{ items=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }
  catch(e){ items=[]; }
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

function getDaysLeft(expiry){
  if(!expiry) return null;
  const diff = Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24));
  return diff;
}
function getStatus(expiry){
  const d = getDaysLeft(expiry);
  if(d===null) return 'ok';
  if(d<0) return 'expired';
  if(d<=3) return 'danger';
  if(d<=7) return 'warn';
  return 'ok';
}
function formatExpiry(expiry){
  const d = getDaysLeft(expiry);
  if(d===null) return '';
  if(d<0) return '已过期';
  if(d===0) return '今天过期！';
  if(d===1) return '明天过期！';
  return d+'天后过期';
}
function badgeClass(status){
  return {danger:'badge-danger',warn:'badge-warn',ok:'badge-ok',expired:'badge-expired'}[status]||'badge-ok';
}

function switchTab(cat){
  currentTab=cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));
  document.getElementById('headerIllo').innerHTML = TAB_ILLOS[cat]||TAB_ILLOS.instant;
  renderList();
  // pre-select cat in add form
  selectedCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('selected',p.dataset.cat===cat));
}

function renderList(){
  const catItems = items.filter(i=>i.cat===currentTab);
  const list = document.getElementById('itemList');
  const empty = document.getElementById('emptyState');
  const banner = document.getElementById('expireBanner');
  const expireRow = document.getElementById('expireItemsRow');
  const chip = document.getElementById('expireChip');

  // expire banner: items expiring within 7 days across ALL categories
  const urgent = items.filter(i=>{const s=getStatus(i.expiry);return s==='danger'||s==='warn';})
    .sort((a,b)=>getDaysLeft(a.expiry)-getDaysLeft(b.expiry));

  if(urgent.length){
    banner.classList.add('visible');
    if(chip){ chip.classList.add('visible'); chip.textContent = `⚠ ${urgent.length}件快过期`; }
    expireRow.innerHTML = urgent.slice(0,6).map(i=>{
      const s=getStatus(i.expiry);
      return `<div class="expire-item-tag ${s}" onclick="openDetail('${i.id}')">
        ${i.emoji} ${i.name} · ${formatExpiry(i.expiry)}
      </div>`;
    }).join('');
  } else {
    banner.classList.remove('visible');
    if(chip){ chip.classList.remove('visible'); }
  }

  if(!catItems.length){
    list.innerHTML='';
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');

  // sort: danger first, then warn, then ok, then expired
  const order={danger:0,warn:1,ok:2,expired:3};
  catItems.sort((a,b)=>{
    const sd=order[getStatus(a.expiry)]-order[getStatus(b.expiry)];
    if(sd!==0) return sd;
    if(!a.expiry&&!b.expiry) return 0;
    if(!a.expiry) return 1;
    if(!b.expiry) return -1;
    return a.expiry.localeCompare(b.expiry);
  });

  list.innerHTML = catItems.map((item,idx)=>{
    const status=getStatus(item.expiry);
    const expText=formatExpiry(item.expiry);
    const cc=CAT_COLORS[item.cat]||CAT_COLORS.instant;
    return `<div class="item-card status-${status}" onclick="openDetail('${item.id}')" style="animation-delay:${idx*0.04}s">
      <div class="item-emoji-wrap" style="background:${cc.bg}">${item.emoji}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-row2">
          <span class="item-qty">${item.qty}</span>
          ${item.note?`<span class="item-note">"${item.note}"</span>`:''}
        </div>
      </div>
      ${expText?`<div class="expire-badge ${badgeClass(status)}">${expText}</div>`:''}
    </div>`;
  }).join('');
}

const EMOJI_QUICK = ['🥣','🥫','🍵','☕','🍜','🍪','🥜','🧃','🥤','🍫','🧈','🥚','🥕','🧂','🫒','🍯','🌶','🥦','🍅','🍗','🥩','🐟','🍎','🍌','🧄','🫙','🫘','🥛','🍳','🥗'];

function buildEmojiGrid(){
  const grid=document.getElementById('emojiGrid');
  grid.innerHTML=EMOJI_QUICK.map(e=>`<div class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji(this,'${e}')">${e}</div>`).join('');
  updateEmojiPreview();
}
function updateEmojiPreview(){
  const p=document.getElementById('emojiPreview');
  if(p) p.textContent=selectedEmoji;
}
function onNameInput(val){
  const matched=autoEmoji(val);
  selectedEmoji=matched;
  updateEmojiPreview();
  document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.toggle('selected',x.textContent===matched));
}
function selectEmoji(el,e){
  selectedEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  updateEmojiPreview();
}
function selectCat(el){
  selectedCat=el.dataset.cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected');
}
function selectQty(el){
  selectedQty=el.dataset.qty;
  document.querySelectorAll('.qty-pill').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected');
}

function openAddModal(){
  pendingPhoto=null;
  selectedEmoji='🥣';
  selectedCat=currentTab;
  selectedQty='多';
  document.getElementById('addName').value='';
  document.getElementById('addExpiry').value=''; document.getElementById('expiryHint').textContent=''; document.querySelectorAll('.expiry-quick').forEach(b=>b.classList.remove('selected'));
  document.getElementById('addNote').value='';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoPlaceholder').style.display='block';
  buildEmojiGrid();
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('selected',p.dataset.cat===currentTab));
  document.querySelectorAll('.qty-pill').forEach(p=>p.classList.toggle('selected',p.dataset.qty==='多'));
  document.getElementById('addModal').classList.add('open');
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function handleOverlayClick(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingPhoto=ev.target.result;
    const prev=document.getElementById('photoPreview');
    prev.src=pendingPhoto; prev.style.display='block';
    document.getElementById('photoPlaceholder').style.display='none';
  };
  reader.readAsDataURL(file);
}




function setExpiryQuick(amount, unit){
  const d = new Date();
  if(unit==='month') d.setMonth(d.getMonth()+amount);
  else d.setFullYear(d.getFullYear()+amount);
  const val = d.toISOString().slice(0,10);
  document.getElementById('addExpiry').value = val;
  // update hint
  const hint = document.getElementById('expiryHint');
  if(hint) hint.textContent = '到期：' + val.replace(/-/g,'/');
  // highlight selected button
  document.querySelectorAll('.expiry-quick').forEach(b=>b.classList.remove('selected'));
  event.target.classList.add('selected');
}
function submitAdd(){
  const name=document.getElementById('addName').value.trim();
  if(!name){ document.getElementById('addName').focus(); return; }
  const item={
    id: Date.now()+'',
    name,
    emoji:selectedEmoji,
    cat:selectedCat,
    expiry:document.getElementById('addExpiry').value||null,
    qty:selectedQty,
    note:document.getElementById('addNote').value.trim()||null,
    photo:pendingPhoto||null,
    createdAt:new Date().toISOString()
  };
  items.unshift(item);
  save();
  closeModal('addModal');
  if(item.cat!==currentTab) switchTab(item.cat);
  else renderList();
}

  document.getElementById('detailContent').innerHTML=`
    <div class="modal-handle"></div>

    <div class="detail-grid">
      <div class="detail-cell">

        <div class="detail-cell-label">过期日期</div>
        <div class="detail-cell-val" style="color:${status==='danger'?'#C03010':status==='warn'?'#A06010':'#3A7020'}">${item.expiry||''} ${expText?'· '+expText:''}</div>

      <div class="detail-note-label">备注</div>
      <div class="detail-note-text">"${item.note}"</div>
    </div>`:''}

    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="quickQty('${item.id}','多')" style="flex:1;padding:10px;border-radius:50px;border:1.5px solid var(--border);background:${item.qty==='多'?'#F5EFE8':'white'};font-size:13px;font-weight:${item.qty==='多'?'700':'400'};color:${item.qty==='多'?'#2C1810':'#A09080'};cursor:pointer">多</button>
      <button onclick="quickQty('${item.id}','少')" style="flex:1;padding:10px;border-radius:50px;border:1.5px solid var(--border);background:${item.qty==='少'?'#F5EFE8':'white'};font-size:13px;font-weight:${item.qty==='少'?'700':'400'};color:${item.qty==='少'?'#2C1810':'#A09080'};cursor:pointer">少</button>
      <button onclick="quickQty('${item.id}','最后一个')" style="flex:1;padding:10px;border-radius:50px;border:1.5px solid var(--border);background:${item.qty==='最后一个'?'#FFE8DC':'white'};font-size:13px;font-weight:${item.qty==='最后一个'?'700':'400'};color:${item.qty==='最后一个'?'#C03010':'#A09080'};cursor:pointer">最后1个</button>
    </div>
    <div style="margin-top:8px">
      <textarea id="editNote_${item.id}" placeholder="备注（可修改）…" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;resize:none;height:68px;outline:none;background:white;color:var(--text)">${item.note||''}</textarea>
      <button onclick="saveNote('${item.id}')" style="width:100%;margin-top:6px;padding:11px;background:#F5EFE8;border:1.5px solid #D4A870;border-radius:50px;font-size:13px;font-weight:600;font-family:inherit;color:#2C1810;cursor:pointer">保存备注</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}
function markEaten(id){
  const item=items.find(i=>i.id===id);
  items=items.filter(i=>i.id!==id);
  save(); closeModal('detailModal'); renderList();
  if(item){
    // show toast asking to add to shopping list
    showToast(item);
  }
}

function showToast(item){
  const existing=document.getElementById('eatToast');
  if(existing) existing.remove();
  const toast=document.createElement('div');
  toast.id='eatToast';
  toast.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2C1810;color:white;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:500;font-family:inherit;display:flex;align-items:center;gap:12px;z-index:500;box-shadow:0 4px 20px rgba(44,24,16,0.3);white-space:nowrap;animation:fadeUp 0.2s ease';
  toast.innerHTML=`<span>${item.emoji} ${item.name} 吃完了！</span>
    <button onclick="addToShopAndDismiss('${item.name}','${item.emoji}')" style="background:#E85030;color:white;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">+ 加入购物清单</button>
    <button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:20px;padding:5px 10px;font-size:12px;font-family:inherit;cursor:pointer">不用</button>`;
  document.body.appendChild(toast);
  setTimeout(()=>{ if(document.getElementById('eatToast')) toast.remove(); }, 5000);
}

function addToShopAndDismiss(name, emoji){
  addToShopList({name, emoji});
  const toast=document.getElementById('eatToast');
  if(toast){
    toast.innerHTML=`<span>✓ 已加入购物清单！</span>`;
    setTimeout(()=>toast.remove(), 1500);
  }
}
function deleteItem(id){
  items=items.filter(i=>i.id!==id);
  save(); closeModal('detailModal'); renderList();
}
function quickQty(id, qty){
  const item=items.find(i=>i.id===id);
  if(!item) return;
  item.qty=qty; save();
  openDetail(id);
}
function saveNote(id){
  const item=items.find(i=>i.id===id);
  if(!item) return;
  const note=document.getElementById('editNote_'+id).value.trim();
  item.note=note||null; save(); renderList();
  const btn=document.querySelector(`#editNote_${id} + button`);
  if(btn){ btn.textContent='✓ 已保存'; btn.style.background='#EDF5E0'; btn.style.borderColor='#C8E0A8'; btn.style.color='#3A7020'; setTimeout(()=>{ btn.textContent='保存备注'; btn.style.background='#F5EFE8'; btn.style.borderColor='#D4A870'; btn.style.color='#2C1810'; },1500); }
}

// ── SETTINGS ──
function openSettings(){ document.getElementById('settingsModal').classList.add('open'); }
function exportData(){
  const blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`囤货本备份_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){ items=data; save(); renderList(); closeModal('settingsModal'); alert('导入成功！共'+data.length+'条记录'); }
    } catch(err){ alert('文件格式不对，请使用正确的备份文件'); }
  };
  reader.readAsText(file);
}
